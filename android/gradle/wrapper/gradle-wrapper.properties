distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# IMPORTANT: pinned to 8.13 deliberately, not a floating 9.x.
# The `rust-android-gradle` plugin (0.9.6) calls
# `AbstractCopyTask.setFileMode(Integer)` from its
# `GenerateLinkerWrapperTask`. That method was deprecated in Gradle 8.3
# and REMOVED in Gradle 9.0, so the plugin hard-fails on 9.x with
# "Unable to find method ... setFileMode(java.lang.Integer)". Until the
# plugin is updated to use `filePermissions { unix(0755) }`, we pin
# here to the last 8.x release, which is the newest Gradle the plugin
# still supports.
#
# DO NOT re-run `gradle wrapper` with a system Gradle 9.x to edit this
# file — it will silently rewrite the `distributionUrl` above with its
# own version. If you need to regenerate the wrapper, use a standalone
# Gradle 8.13 binary, or pass `--gradle-version 8.13` (but note that
# configuration-phase plugin evaluation still runs and will fail on
# 9.x regardless, so the standalone approach is the only reliable one).
distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
